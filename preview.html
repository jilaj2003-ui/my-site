<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემი პირველი საიტი</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        header {
            background-color: #6c63ff;
            color: white;
            padding: 20px;
        }

        .container {
            padding: 30px;
        }

        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background-color: #4e47cc;
        }
    </style>
</head>

<body>

<header>
    <h1>გამარჯობა 👋</h1>
    <p>ეს არის ჩემი პირველი საიტი</p>
</header>

<div class="container">
    <h2>ჩემ შესახებ</h2>
    <p>მე ვსწავლობ ვებს და ეს ჩემი პირველი პროექტია.</p>

    <button onclick="showMessage()">დამაჭირე</button>
</div>

<script>
    function showMessage() {
        alert("შენ დააჭირე ღილაკს 😄");
    }
</script>

</body>
</html>
